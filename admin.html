<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية — قصر المكسرات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #9B6DFF; --secondary: #FF5A9F; --accent: #FFDF40;
            --bg: #F5FEFF; --white: #ffffff; --text: #2d1a2e; --text-soft: #5a3e52;
            --shadow: 0 10px 30px rgba(155, 109, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; min-height: 100vh; line-height: 1.6; }

        nav.admin-nav {
            background: #fff; padding: 1.2rem 5%; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .sidebar {
            width: 280px; background: #fff; position: fixed; top: 70px; bottom: 0; right: 0;
            padding: 2.5rem; border-left: 1px solid rgba(0,0,0,0.05); overflow-y: auto;
        }
        .main-content { margin-right: 280px; padding: 4rem; }
        .sidebar ul { list-style: none; }
        .sidebar li { 
            padding: 1.2rem 1.5rem; border-radius: 16px; cursor: pointer; font-weight: 700;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: var(--text-soft); margin-bottom: 0.8rem;
            display: flex; align-items: center; gap: 15px;
        }
        .sidebar li:hover { background: #fff0f6; color: var(--primary); transform: translateX(-10px); }
        .sidebar li.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; box-shadow: 0 10px 20px rgba(212, 44, 125, 0.2); }

        .admin-btn {
            background: var(--primary); color: #fff; border: none; padding: 0.7rem 1.2rem;
            border-radius: 10px; font-weight: 700; cursor: pointer; font-family: inherit; transition: 0.3s;
        }
        .admin-btn.secondary { background: #eee; color: #333; }
        .admin-btn.danger { background: #ff4d4d; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; border-radius: 24px; overflow: hidden; margin-top: 2rem; box-shadow: var(--shadow); }
        th { background: #fff0f6; padding: 1.5rem; text-align: right; color: var(--secondary); font-weight: 800; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        td { padding: 1.5rem; border-bottom: 1px solid #f9f9f9; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fffbf5; }

        input, select, textarea {
            width: 100%; padding: 1.1rem; border: 1.5px solid #eee; border-radius: 14px;
            margin-bottom: 1.5rem; font-family: inherit; outline: none; transition: 0.3s;
            background: #fafafa;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(212, 44, 125, 0.1); }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000;
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .modal-content { background: #fff; padding: 2.5rem; border-radius: 24px; width: 100%; max-width: 500px; }
        
        .img-preview { width: 100px; height: 100px; border-radius: 15px; object-fit: cover; border: 2px dashed #ddd; margin-bottom: 1rem; }
        @media (max-width: 768px) {
            .sidebar { position: static; width: 100%; height: auto; border-left: none; border-bottom: 1px solid #eee; padding: 1rem; display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 0.5rem; }
            .sidebar li { margin-bottom: 0; padding: 0.8rem 1.2rem; font-size: 0.9rem; white-space: nowrap; }
            .main-content { margin-right: 0; padding: 2rem 5%; }
            table { display: block; overflow-x: auto; white-space: nowrap; }
            #login-screen > div > div { padding: 2rem !important; margin: 1rem; }
        }
        .stat-card {
            padding: 2rem;
            border-radius: 24px;
            color: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            text-align: center;
        }
        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.12);
        }
        .stat-card h3 {
            font-size: 1rem;
            margin-bottom: 0.8rem;
            opacity: 0.9;
            font-weight: 700;
            margin-top: 0;
        }
        .stat-card h2 {
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);">
        <div style="background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 4rem; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); width: 100%; max-width: 450px; text-align: center; border: 1px solid rgba(255,255,255,0.3);">
            <div style="margin: 0 auto 2rem; text-align: center;">
                <img src="logo.png" alt="شعار قصر المكسرات" style="max-height: 100px; width: auto; object-fit: contain;">
            </div>
            <h2 style="margin-bottom: 0.5rem; font-weight: 900; color: var(--secondary);">مرحباً بك مجدداً</h2>
            <p style="color: var(--text-soft); margin-bottom: 2.5rem; font-size: 0.95rem;">سجل دخولك لإدارة قصر المكسرات</p>
            
            <div style="text-align: right;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 700; color: var(--text-soft); font-size: 0.9rem;">البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="admin@example.com" style="margin-bottom: 1.5rem; padding: 1.2rem;">
                
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 700; color: var(--text-soft); font-size: 0.9rem;">كلمة المرور</label>
                <input type="password" id="password" placeholder="••••••••" style="margin-bottom: 2rem; padding: 1.2rem;">
            </div>
            
            <button class="admin-btn" style="width: 100%; padding: 1.2rem; font-size: 1.1rem; border-radius: 18px; display: flex; align-items: center; justify-content: center; gap: 10px;" id="login-btn">
                <span>دخول للوحة التحكم</span>
                <span id="login-loader" style="display: none;">⏳</span>
            </button>
            
            <p style="margin-top: 2rem; font-size: 0.85rem; color: #aaa;">&copy; قصر المكسرات — نظام الإدارة المحمي</p>
        </div>
    </div>
</div>

<div id="dashboard" style="display: none;">
    <nav class="admin-nav">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="logo.png" alt="شعار المتجر" style="height: 45px; width: auto; object-fit: contain;">
            <h3 style="font-weight: 900; color: var(--secondary); margin: 0;">قصر المكسرات</h3>
        </div>
        <button class="admin-btn secondary" onclick="logout()">خروج</button>
    </nav>

    <div class="sidebar">
        <ul>
            <li onclick="switchTab('reports')" id="btn-reports">📊 التقارير</li>
            <li onclick="switchTab('orders')" id="btn-orders" class="active">📦 الطلبات</li>
            <li onclick="switchTab('products')" id="btn-products">🥜 المنتجات</li>
            <li onclick="switchTab('best_sellers')" id="btn-best_sellers">🔥 الأكثر مبيعاً</li>
            <li onclick="switchTab('cats')" id="btn-cats">📁 الأقسام</li>
            <li onclick="switchTab('coupons')" id="btn-coupons">🎟️ الكوبونات</li>
            <li onclick="switchTab('messages')" id="btn-messages">✉️ الرسائل</li>
            <li onclick="switchTab('shipping')" id="btn-shipping">🚚 مناطق الشحن</li>
            <li onclick="switchTab('settings')" id="btn-settings">⚙️ إعدادات المتجر</li>
        </ul>
    </div>

    <div class="main-content">
        <div id="tab-content"></div>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-content" id="modal-body"></div>
</div>

<script>
    const SUPABASE_URL = 'https://ndnulanpxtyibqbyxjhw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kbnVsYW5weHR5aWJxYnl4amh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MDk2NjIsImV4cCI6MjA5NDE4NTY2Mn0.5ZBZeoUiKdAqO_W0S4X2J1BmDvNBI-z4LuO1aYJDrCs';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let activeTab = 'orders';
    let categories = [], products = [], orders = [], coupons = [], messages = [], bestSellers = [], shippingZones = [];
    let storeSettings = {};
    let orderSearchQuery = '';
    let orderStatusFilter = 'all';
    let orderStartDate = '';
    let orderEndDate = '';
    let currentFilteredOrders = [];

    document.getElementById('login-btn').onclick = async () => {
        const btn = document.getElementById('login-btn');
        const loader = document.getElementById('login-loader');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (!email || !password) return alert('يرجى إدخال البريد الإلكتروني وكلمة المرور');

        btn.disabled = true;
        loader.style.display = 'inline-block';

        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        
        btn.disabled = false;
        loader.style.display = 'none';

        if (error) {
            alert('خطأ في الدخول: ' + error.message);
        } else {
            checkSession();
        }
    };

    async function checkSession() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadData();
        }
    }
    async function logout() { await supabaseClient.auth.signOut(); window.location.reload(); }

    async function loadData() {
        const { data: c } = await supabaseClient.from('categories').select('*'); 
        categories = (c || []).map(cat => {
            if (cat.slug && cat.slug.includes('||')) {
                const parts = cat.slug.split('||');
                return { ...cat, slug: parts[0], image_url: parts[1] };
            }
            return { ...cat, image_url: null };
        });
        const { data: p } = await supabaseClient.from('products').select('*'); products = p || [];
        const { data: o } = await supabaseClient.from('orders').select('*').order('created_at', {ascending: false}); orders = o || [];
        const { data: cp } = await supabaseClient.from('coupons').select('*'); coupons = cp || [];
        const { data: m } = await supabaseClient.from('contact_messages').select('*').order('created_at', {ascending: false}); messages = m || [];
        const { data: bsData } = await supabaseClient.from('best_sellers').select('*');
        bestSellers = (bsData || []).map(item => {
            const p = products.find(x => x.id === item.product_id);
            return { ...item, products: p };
        });
        const { data: sz } = await supabaseClient.from('shipping_zones').select('*'); shippingZones = sz || [];
        const { data: st } = await supabaseClient.from('store_settings').select('*');
        if (st) {
            st.forEach(s => storeSettings[s.key] = s.value);
        }
        renderTab();
    }

    function switchTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.sidebar li').forEach(li => li.classList.remove('active'));
        document.getElementById(`btn-${tab}`).classList.add('active');
        renderTab();
    }

    function getImageUrl(path) {
        if(!path) return '';
        if(path.startsWith('http')) return path;
        return `${SUPABASE_URL}/storage/v1/object/public/products/${path}`;
    }

    function renderTab() {
        const container = document.getElementById('tab-content');
        if (activeTab === 'orders') {
            // Apply filtering in memory
            let filteredOrders = orders.filter(o => {
                const matchesSearch = !orderSearchQuery ? true : (
                    o.customer_name.toLowerCase().includes(orderSearchQuery.toLowerCase()) || 
                    o.customer_phone.includes(orderSearchQuery) ||
                    (o.id && String(o.id).includes(orderSearchQuery))
                );
                const matchesStatus = orderStatusFilter === 'all' ? true : o.status === orderStatusFilter;
                
                let matchesDate = true;
                if (o.created_at) {
                    const orderDate = new Date(o.created_at).toISOString().split('T')[0];
                    if (orderStartDate && orderDate < orderStartDate) matchesDate = false;
                    if (orderEndDate && orderDate > orderEndDate) matchesDate = false;
                }
                
                return matchesSearch && matchesStatus && matchesDate;
            });
            currentFilteredOrders = filteredOrders;

            container.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; margin-bottom:2rem;">
                    <h2>📦 إدارة الطلبات (${filteredOrders.length})</h2>
                    <button class="admin-btn" onclick="exportOrdersToCSV()" style="margin: 0; padding: 0.7rem 1.2rem; border-radius: 12px; display: flex; align-items: center; gap: 8px; font-weight: 700; background: #e8f9f0; color: #28a745; border: 1px solid #28a745; cursor:pointer;">
                        📥 تصدير الطلبات كـ CSV
                    </button>
                </div>
                
                <div style="display:flex; gap:12px; margin-bottom:1.5rem; flex-wrap:wrap; background:#fff; padding:1.2rem; border-radius:20px; box-shadow: var(--shadow);">
                    <input type="text" placeholder="🔍 ابحث باسم العميل، الهاتف، أو رقم الطلب..." 
                        value="${orderSearchQuery}" 
                        oninput="orderSearchQuery = this.value; renderTab();" 
                        style="flex:2; margin-bottom:0; padding:0.8rem 1.2rem; border-radius:12px; border:1.5px solid #eee; min-width: 250px;">
                    
                    <select onchange="orderStatusFilter = this.value; renderTab();" 
                        style="flex:1; margin-bottom:0; padding:0.8rem 1.2rem; border-radius:12px; border:1.5px solid #eee; background:#fff; min-width: 150px;">
                        <option value="all" ${orderStatusFilter === 'all' ? 'selected' : ''}>📌 كل الحالات</option>
                        <option value="pending" ${orderStatusFilter === 'pending' ? 'selected' : ''}>⏳ قيد التنفيذ</option>
                        <option value="completed" ${orderStatusFilter === 'completed' ? 'selected' : ''}>✅ تم التوصيل</option>
                    </select>

                    <input type="date" value="${orderStartDate}" onchange="orderStartDate = this.value; renderTab();" style="flex:1; margin-bottom:0; padding:0.8rem 1.2rem; border-radius:12px; border:1.5px solid #eee; min-width: 130px;" title="من تاريخ">
                    <input type="date" value="${orderEndDate}" onchange="orderEndDate = this.value; renderTab();" style="flex:1; margin-bottom:0; padding:0.8rem 1.2rem; border-radius:12px; border:1.5px solid #eee; min-width: 130px;" title="إلى تاريخ">
                </div>
            ` + (filteredOrders.length === 0 ? `
                <div style="text-align:center; padding:4rem; color:var(--text-soft); background:#fff; border-radius:24px; box-shadow:var(--shadow);">
                    <p style="font-size:1.2rem; font-weight:700; margin-bottom:0.5rem;">لا توجد طلبات تطابق معايير البحث!</p>
                    <p style="font-size:0.9rem;">تأكد من إدخال الاسم أو رقم الهاتف بشكل صحيح، أو تغيير حالة التصفية.</p>
                </div>
            ` : filteredOrders.map(o => {
                const date = o.created_at ? new Date(o.created_at).toLocaleString('ar-EG', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: true
                }) : 'تاريخ غير معروف';

                const payMethodLabel = o.payment_method === 'instapay' ? '💳 انستاباي (Instapay)' : '💵 الدفع عند الاستلام';

                const addressParts = o.address ? o.address.split(' || المنتجات: ') : ['غير حدد', ''];
                const addressOnly = addressParts[0];
                const productsList = addressParts[1] || 'غير متوفرة (طلب قديم)';

                return `
                <div style="background:#fff; padding:2rem; border-radius:24px; margin-top:1.5rem; border-right:6px solid ${o.status==='completed'?'#28a745':'var(--primary)'}; box-shadow: var(--shadow); position:relative; overflow:hidden;">
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:1rem; border-bottom:1px dashed rgba(0,0,0,0.05); padding-bottom:1rem;">
                        <div>
                            <span style="background:rgba(155, 109, 255, 0.1); color:var(--secondary); padding:4px 12px; border-radius:50px; font-weight:800; font-size:0.85rem; margin-left:8px;">
                                الطلب #${o.id}
                            </span>
                            <span style="font-size:0.9rem; color:var(--text-soft); font-weight:600;">
                                📅 ${date}
                            </span>
                        </div>
                        <b style="color:var(--primary); font-size:1.4rem; font-weight:900;">${o.total_amount} EGP</b>
                    </div>
                    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:1rem; font-size:0.95rem;">
                        <div>
                            <p style="margin-bottom:0.4rem;"><strong>👤 العميل:</strong> ${o.customer_name}</p>
                            <p style="margin-bottom:0.4rem;"><strong>📞 الهاتف:</strong> <a href="tel:${o.customer_phone}" style="color:var(--secondary); text-decoration:none; font-weight:700;">${o.customer_phone}</a></p>
                            <p style="margin-bottom:0.4rem;"><strong>💳 طريقة الدفع:</strong> ${payMethodLabel}</p>
                        </div>
                        <div>
                            <p style="margin-bottom:0.4rem;"><strong>📍 المدينة:</strong> ${o.city || 'غير محدد'}</p>
                            <p style="margin-bottom:0.4rem;"><strong>🏠 العنوان بالتفصيل:</strong> ${addressOnly}</p>
                            <div style="display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-top:0.8rem;">
                                <strong>⚙️ حالة الطلب:</strong>
                                <select onchange="updateStatus(${o.id}, this.value)" style="width:auto; margin-bottom:0; padding:0.4rem 1rem; border-radius:10px; font-size:0.85rem; background:#fff0f6; border-color:var(--primary);">
                                    <option value="pending" ${o.status==='pending'?'selected':''}>قيد التنفيذ ⏳</option>
                                    <option value="completed" ${o.status==='completed'?'selected':''}>تم التوصيل ✅</option>
                                </select>
                                <button onclick="deleteItem('orders', ${o.id})" style="background:#fff0f6; color:#ff4d4d; border:1px solid #ffccdf; padding:0.4rem 1rem; border-radius:10px; cursor:pointer; font-weight:bold; font-family:inherit; transition:0.3s; font-size:0.85rem;" onmouseover="this.style.background='#ffd6e6'" onmouseout="this.style.background='#fff0f6'">🗑️ حذف الطلب</button>
                            </div>
                        </div>
                    </div>
                    <div style="margin-top: 1.5rem; background: rgba(255, 90, 159, 0.04); border: 1px dashed rgba(255, 90, 159, 0.2); padding: 1.2rem; border-radius: 16px;">
                        <strong style="color: var(--secondary); display: flex; align-items: center; gap: 6px; margin-bottom: 0.6rem;">
                            📦 المنتجات المطلوبة وأوزانها:
                        </strong>
                        <div style="color: var(--primary); font-weight: 700; font-size: 1.1rem; line-height: 1.6;">
                            ${productsList.split(' - ').map(p => `• ${p}`).join('<br>')}
                        </div>
                    </div>
                </div>
                `;
            }).join(''));
        } else if (activeTab === 'products') {
            container.innerHTML = `<div style="display:flex; justify-content:space-between;"><h2>🥜 المنتجات</h2><button class="admin-btn" onclick="showProductModal()">+ إضافة منتج</button></div>
            <table><tr><th>صورة</th><th>الاسم</th><th>السعر</th><th>التحكم</th></tr>` + products.map(p => `
                <tr>
                    <td><img src="${getImageUrl(p.image_url)}" style="width:50px; height:50px; border-radius:8px; object-fit:cover;"></td>
                    <td>${p.name}</td>
                    <td>${p.price} EGP</td>
                    <td>
                        <button onclick="showProductModal(${p.id})" style="color:blue; border:none; background:none; cursor:pointer;">تعديل</button>
                        <button onclick="deleteItem('products', ${p.id})" style="color:red; border:none; background:none; cursor:pointer; margin-right:10px;">حذف</button>
                    </td>
                </tr>
            `).join('') + `</table>`;
        } else if (activeTab === 'cats') {
            container.innerHTML = `<div style="display:flex; justify-content:space-between;"><h2>📁 الأقسام</h2><button class="admin-btn" onclick="showCatModal()">+ إضافة قسم</button></div>
            <table><tr><th>صورة</th><th>الاسم</th><th>التحكم</th></tr>` + categories.map(c => `
                <tr>
                    <td><img src="${getImageUrl(c.image_url)}" style="width:50px; height:50px; border-radius:8px; object-fit:cover;"></td>
                    <td>${c.name}</td>
                    <td>
                    <button onclick="showCatModal(${c.id})" style="color:blue; border:none; background:none; cursor:pointer;">تعديل</button>
                    <button onclick="deleteItem('categories', ${c.id})" style="color:red; border:none; background:none; cursor:pointer; margin-right:10px;">حذف</button>
                </td></tr>
            `).join('') + `</table>`;
        } else if (activeTab === 'coupons') {
            container.innerHTML = `<div style="display:flex; justify-content:space-between;"><h2>🎟️ الكوبونات</h2><button class="admin-btn" onclick="showCouponModal()">+ إضافة كوبون</button></div>
            <table><tr><th>الكود</th><th>الخصم</th><th>التحكم</th></tr>` + coupons.map(c => `
                <tr><td>${c.code}</td><td>${c.discount_percent}%</td><td>
                    <button onclick="deleteItem('coupons', ${c.id})" style="color:red; border:none; background:none; cursor:pointer;">حذف</button>
                </td></tr>
            `).join('') + `</table>`;
        } else if (activeTab === 'messages') {
            container.innerHTML = `<h2>✉️ الرسائل</h2>` + messages.map(m => `
                <div style="background:#fff; padding:1.5rem; border-radius:15px; margin-top:1rem; border-right:4px solid var(--accent);">
                    <strong>${m.full_name || m.name} (${m.phone})</strong><p>${m.message}</p>
                </div>
            `).join('');
        } else if (activeTab === 'best_sellers') {

    async function saveSettings() {
        const keys = ['address', 'phone', 'facebook', 'instagram', 'tiktok'];
        let hasError = false;
        let lastError = '';
        
        for (let key of keys) {
            const val = document.getElementById('set-' + key).value;
            const { data, error: selectErr } = await supabaseClient.from('store_settings').select('id').eq('key', key);
            
            if (selectErr) {
                hasError = true;
                lastError = selectErr.message;
                break;
            }
            
            if (data && data.length > 0) {
                const { error: updateErr } = await supabaseClient.from('store_settings').update({ value: val }).eq('key', key);
                if (updateErr) { hasError = true; lastError = updateErr.message; break; }
            } else {
                const { error: insertErr } = await supabaseClient.from('store_settings').insert({ key: key, value: val });
                if (insertErr) { hasError = true; lastError = insertErr.message; break; }
            }
        }
        
        if (hasError) {
            alert('خطأ في حفظ الإعدادات: ' + lastError + '\n\nتأكد من إنشاء جدول store_settings في قاعدة البيانات.');
        } else {
            alert('تم حفظ الإعدادات بنجاح!');
            loadData();
        }
    }

    function exportOrdersToCSV() {
        if (!currentFilteredOrders || currentFilteredOrders.length === 0) {
            if (orders.length === 0) return alert('لا توجد طلبات لتصديرها!');
            return alert('لا توجد طلبات تطابق الفلتر لتصديرها!');
        }
        
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // UTF-8 BOM for Arabic text
        csvContent += "رقم الطلب,العميل,الهاتف,المدينة,العنوان بالتفصيل,طريقة الدفع,القيمة الإجمالية,الحالة,التاريخ\n";
        
        currentFilteredOrders.forEach(o => {
            const addressParts = o.address ? o.address.split(' || المنتجات: ') : ['غير محدد', ''];
            const addressOnly = addressParts[0].replace(/,/g, ' ');
            const productsList = (addressParts[1] || 'غير متوفرة').replace(/,/g, ' - ');
            const payLabel = o.payment_method === 'instapay' ? 'انستاباي' : 'الدفع عند الاستلام';
            const statusLabel = o.status === 'completed' ? 'تم التوصيل' : 'قيد التنفيذ';
            const date = o.created_at ? new Date(o.created_at).toLocaleDateString('ar-EG') : 'غير معروف';
            
            csvContent += `${o.id},"${o.customer_name}","${o.customer_phone}","${o.city}","${addressOnly} | المنتجات: ${productsList}","${payLabel}",${o.total_amount},"${statusLabel}","${date}"\n`;
        });
        
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `طلبات_قصر_المكسرات_${new Date().toLocaleDateString('en-US')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    async function saveCat(id) {
        const name = document.getElementById('m-name').value;
        const slugInput = document.getElementById('m-slug').value;
        const file = document.getElementById('m-cat-file') ? document.getElementById('m-cat-file').files[0] : null;
        
        if (!name) return alert('يرجى إدخال اسم القسم');

        let imageUrl = id ? categories.find(x => x.id === id).image_url : null;

        if (file) {
            const ext = file.name.split('.').pop() || 'png';
            const fileName = `cat_${Date.now()}.${ext}`;
            const { data, error } = await supabaseClient.storage.from('products').upload(fileName, file);
            if (error) return alert('خطأ في رفع الصورة: ' + error.message);
            imageUrl = fileName;
        }

        const finalSlug = slugInput || `cat_${Date.now()}`;
        const combinedSlug = imageUrl ? `${finalSlug}||${imageUrl}` : finalSlug;

        // Save WITHOUT image_url column to avoid DB errors
        const data = { name, slug: combinedSlug };
        
        let res;
        if(id) res = await supabaseClient.from('categories').update(data).eq('id', id);
        else res = await supabaseClient.from('categories').insert(data);
        
        if (res.error) {
            alert('خطأ أثناء الحفظ في قاعدة البيانات: \n' + res.error.message);
            return;
        }
        
        closeModal(); loadData();
    }

            <input id="m-percent" type="number" placeholder="النسبة %">
            <button class="admin-btn" onclick="saveCoupon()">حفظ</button>
            <button class="admin-btn secondary" onclick="closeModal()">إلغاء</button>
        `);
    }
    async function saveCoupon() {
        await supabaseClient.from('coupons').insert({ code: document.getElementById('m-code').value, discount_percent: document.getElementById('m-percent').value });
        closeModal(); loadData();
    }

    // Best Seller Modals and saving
    function showBestSellerModal(id = null) {
        const bs = id ? bestSellers.find(x => x.id === id) : { product_id: '', sales_count: 0 };
        const currentBsProductIds = bestSellers.map(x => x.product_id);
        const availableProducts = products.filter(p => !currentBsProductIds.includes(p.id) || p.id === bs.product_id);
        
        openModal(`
            <h3>${id ? 'تعديل الأكثر مبيعاً' : 'إضافة للأكثر مبيعاً'}</h3>
            <label style="display:block; margin: 1rem 0 0.5rem; font-weight:700;">اختر المنتج</label>
            <select id="bs-product" ${id ? 'disabled' : ''}>
                ${availableProducts.map(p => `<option value="${p.id}" ${p.id === bs.product_id ? 'selected' : ''}>${p.name} (${p.price} EGP)</option>`).join('')}
            </select>
            <label style="display:block; margin: 0.5rem 0; font-weight:700;">عدد المبيعات الافتراضي</label>
            <input id="bs-sales" type="number" value="${bs.sales_count}" placeholder="عدد المبيعات">
            <button class="admin-btn" onclick="saveBestSeller(${id})">حفظ</button>
            <button class="admin-btn secondary" onclick="closeModal()">إلغاء</button>
        `);
    }

    async function saveBestSeller(id) {
        const productId = document.getElementById('bs-product').value;
        const salesCount = parseInt(document.getElementById('bs-sales').value) || 0;
        
        if (!productId) return alert('يرجى اختيار منتج');
        
        const data = { product_id: parseInt(productId), sales_count: salesCount };
        
        let res;
        if (id) {
            res = await supabaseClient.from('best_sellers').update({ sales_count: salesCount }).eq('id', id);
        } else {
            res = await supabaseClient.from('best_sellers').insert(data);
        }
        
        if (res.error) {
            alert('خطأ أثناء الحفظ في قاعدة البيانات: \n' + res.error.message);
        } else {
            closeModal(); loadData();
        }
    }

    checkSession();
</script>
</body>
</html>
